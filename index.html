window.adjLev=function(d){const max=MAX_LEV[S.coin]||20;OE.leverage=Math.max(1,Math.min(max,OE.leverage+d));renderOrderEntry()};
window.setSizePct=function(pct){const price=S.mids?.[S.coin]?+S.mids[S.coin]:0;if(!price)return;OE.sizePct=pct;const margin=S.account.capital*(pct/100);const sizeInCoin=(margin*OE.leverage)/price;OE.size=sizeInCoin.toFixed(sizeInCoin>1?4:6);renderOrderEntry()};
window.submitOrder=function(){const mktPrice=S.mids?.[S.coin]?+S.mids[S.coin]:0;if(!mktPrice)return;const qty=parseFloat(OE.size)||0;if(qty<=0){alert('Enter a size');return}const entryPrice=OE.orderType==='limit'?(parseFloat(OE.limitPrice)||mktPrice):mktPrice;const tp=parseFloat(OE.tp)||0;const sl=parseFloat(OE.sl)||0;openPosition(S.coin,OE.side,entryPrice,sl,tp,'MANUAL',qty);OE.size='';OE.tp='';OE.sl='';OE.limitPrice='';OE.sizePct=0;renderOrderEntry()};
window.prefillOrder=function(dir,entry,sl,tp,strat,coin){if(coin)switchCoin(coin);OE.side=dir;OE.tpslOn=!!(sl||tp);OE.sl=sl?sl.toString():'';OE.tp=tp?tp.toString():'';const price=entry||+(S.mids?.[coin||S.coin])||0;if(sl&&price){const risk=Math.abs(price-sl),rAmt=S.account.capital*(S.account.riskPct/100),qty=risk>0?rAmt/risk:0;OE.size=qty.toFixed(qty>1?4:6)}OE.leverage=5;renderOrderEntry()};
window.openPosition=function(coin,dir,entry,sl,tp,strat,qty){const pos={id:Date.now(),coin:coin||S.coin,dir,entry:entry||+(S.mids?.[coin||S.coin])||0,sl:sl||0,tp:tp||0,strat:strat||'MANUAL',qty:qty||0,openTime:Date.now()};if(!pos.entry)return;if(!pos.qty&&pos.sl){const risk=Math.abs(pos.entry-pos.sl),rAmt=S.account.capital*(S.account.riskPct/100);pos.qty=risk>0?rAmt/risk:0}if(!pos.qty)pos.qty=(S.account.capital*0.01)/pos.entry;S.positions.push(pos);savePositions();playAlert();renderPositions()};
window.closePosition=function(id,exitPrice){const idx=S.positions.findIndex(p=>p.id===id);if(idx===-1)return;const pos=S.positions[idx];const exit=exitPrice||+(S.mids?.[pos.coin])||0;if(!exit)return;const pnl=pos.dir==='LONG'?(exit-pos.entry)*pos.qty:(pos.entry-exit)*pos.qty;S.closedPositions.push({...pos,exit,closeTime:Date.now(),pnl});S.positions.splice(idx,1);savePositions();playAlert();renderPositions();if(S.tab==='log')renderLog()};
window.closeAllPositions=function(){if(!confirm('Close all positions at market?'))return;[...S.positions].forEach(p=>closePosition(p.id))};
function renderPositions(){const el=document.getElementById("positionsPanel");if(!el)return;const open=S.positions;if(!open.length){el.innerHTML='';return}const totalPnl=open.reduce((s,p)=>{const px=+(S.mids?.[p.coin])||0;const pnl=p.dir==='LONG'?(px-p.entry)*p.qty:(p.entry-px)*p.qty;return s+pnl},0);let html='<div style="margin:10px 0;padding:12px;background:var(--bg1);border:1px solid var(--b0);border-radius:8px">';html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px"><span style="font:800 10px var(--m);color:var(--tx8);letter-spacing:.08em">OPEN POSITIONS</span><span style="font:700 8px var(--m);padding:2px 6px;border-radius:3px;background:rgba(0,255,213,.06);color:var(--teal)">'+open.length+'</span></div><div style="display:flex;align-items:center;gap:10px"><span style="font:800 12px var(--m);color:'+(totalPnl>=0?'var(--teal)':'var(--red)')+'">'+(totalPnl>=0?'+':'')+fmt$(totalPnl)+'</span>'+(open.length>1?'<button class="log-btn log-btn-danger" style="padding:3px 8px;font-size:7px" onclick="closeAllPositions()">CLOSE ALL</button>':'')+'</div></div>';open.forEach(p=>{const px=+(S.mids?.[p.coin])||0;const pnl=p.dir==='LONG'?(px-p.entry)*p.qty:(p.entry-px)*p.qty;const pnlPct=p.entry>0?((p.dir==='LONG'?(px-p.entry)/p.entry:(p.entry-px)/p.entry)*100):0;const hitSL=p.sl&&((p.dir==='LONG'&&px<=p.sl)||(p.dir==='SHORT'&&px>=p.sl));const hitTP=p.tp&&((p.dir==='LONG'&&px>=p.tp)||(p.dir==='SHORT'&&px<=p.tp));const cfg=CFG[p.strat]||{color:'var(--tx5)'};html+='<div style="padding:10px;margin-bottom:6px;background:var(--bg);border:1px solid '+(hitSL?'rgba(255,51,102,.3)':hitTP?'rgba(0,255,213,.3)':'var(--b0)')+';border-radius:6px">';html+='<div style="display:flex;justify-content:space-between;align-items:center">';html+='<div style="display:flex;align-items:center;gap:8px"><span style="font:800 11px var(--m);color:var(--tx8)">'+p.coin+'</span><span style="font:700 8px var(--m);color:'+(p.dir==='LONG'?'var(--teal)':'var(--red)')+'">'+(p.dir==='LONG'?'▲':'▼')+' '+p.dir+'</span><span style="font:600 7px var(--m);color:'+cfg.color+'">'+p.strat+'</span></div>';html+='<div style="display:flex;align-items:center;gap:10px"><span style="font:800 14px var(--m);color:'+(pnl>=0?'var(--teal)':'var(--red)')+'">'+(pnl>=0?'+':'')+fmt$(pnl)+'</span><span style="font:600 9px var(--m);color:'+(pnlPct>=0?'var(--teal)':'var(--red)')+'">'+(pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'%</span></div></div>';html+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:4px 8px;margin-top:8px;font:500 8px var(--m)"><div><span style="color:var(--tx3)">ENTRY </span><span style="color:var(--tx6)">'+fmtPx(p.entry)+'</span></div><div><span style="color:var(--tx3)">NOW </span><span style="color:var(--tx8)">'+fmtPx(px)+'</span></div><div><span style="color:var(--red)">SL </span><span style="color:'+(hitSL?'var(--red)':'var(--tx5')+'">'+(p.sl?fmtPx(p.sl):'--')+'</span></div><div><span style="color:var(--teal)">TP </span><span style="color:'+(hitTP?'var(--teal)':'var(--tx5)')+'">'+(p.tp?fmtPx(p.tp):'--')+'</span></div></div>';html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><div style="font:500 7px var(--m);color:var(--tx3)">'+p.qty.toFixed(p.qty>1?2:4)+' '+p.coin+' · '+fmt$(p.qty*p.entry)+'</div><div style="display:flex;gap:4px">';if(hitSL)html+='<button class="log-btn log-btn-danger" style="padding:3px 8px;font-size:7px" onclick="closePosition('+p.id+','+p.sl+')">HIT SL</button>';if(hitTP)html+='<button class="log-btn log-btn-primary" style="padding:3px 8px;font-size:7px" onclick="closePosition('+p.id+','+p.tp+')">HIT TP</button>';html+='<button class="log-btn log-btn-danger" style="padding:3px 8px;font-size:7px" onclick="closePosition('+p.id+')">CLOSE</button></div></div></div>'});html+='</div>';el.innerHTML=html}
setInterval(()=>{if(S.positions.length&&S.tab==='signals')renderPositions()},1000);
function renderGlobal(){const utcH=new Date().getUTCHours(),kz=utcH>=0&&utcH<3?"ASIA":utcH>=7&&utcH<10?"LONDON":utcH>=13&&utcH<16?"NY":utcH>=15&&utcH<17?"LDN/CL":"OFF",kzOn=kz!=="OFF";document.getElementById("kzBadge").innerHTML='<div class="dot" style="background:'+(kzOn?"var(--teal)":"var(--red)")+'"></div><span style="font:700 7px var(--m);color:'+(kzOn?"var(--teal)":"var(--red)")+'">'+kz+'</span>';document.getElementById("kzBadge").style.cssText='display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;background:'+(kzOn?"rgba(0,255,213,.05)":"rgba(255,51,102,.05)")+';border:1px solid '+(kzOn?"rgba(0,255,213,.12)":"rgba(255,51,102,.12)");const allS=[...S.sigs.ict,...S.sigs.orb,...S.sigs.tt,...S.sigs.qf],ac=allS.filter(s=>AC.includes(s.st));document.getElementById("activeBadge").innerHTML=(ac.length?'<span class="badge" style="color:var(--teal);background:rgba(0,255,213,.06)">'+ac.length+' LIVE</span>':"")+(S.positions.length?'<span class="badge" style="color:var(--amber);background:rgba(255,170,34,.06);margin-left:4px">'+S.positions.length+' OPEN</span>':"");document.getElementById("connBadge").textContent=S.wsOk?"WS":"REST";document.getElementById("connBadge").style.cssText='font:700 7px var(--m);padding:2px 7px;border-radius:3px;color:'+(S.wsOk?"var(--teal)":"var(--amber)")+';background:'+(S.wsOk?"rgba(0,255,213,.06)":"rgba(255,170,34,.06)");document.getElementById("timeStamp").textContent=S.lastT?S.lastT.toLocaleTimeString():"";document.getElementById("ticker").innerHTML=COINS.map(c=>{const p=S.mids?.[c]?+S.mids[c]:null,pp=S.prev?.[c]?+S.prev[c]:null,ch=pp&&p?((p-pp)/pp)*100:0;return'<div class="tick'+(c===S.coin?" on":"")+'" onclick="jumpTo(\''+c+'\')"><span class="tick-sym">'+c+'</span><span class="tick-px">'+(p?(p>1000?p.toFixed(0):p>1?p.toFixed(2):p.toFixed(6)):"--")+'</span>'+(ch!==0?'<span class="tick-ch" style="color:'+(ch>=0?"var(--teal)":"var(--red)")+'">'+(ch>=0?"+":"")+ch.toFixed(2)+'%</span>':"")+'</div>'}).join("");renderActive()}
async function loadData(){S.loading=true;S.err=null;if(S.tab==='signals')renderSignals();try{const now=Date.now(),defs=[["1m",6*3600e3],["5m",3*24*3600e3],["15m",7*24*3600e3],["1h",30*24*3600e3],["4h",90*24*3600e3],["1d",365*24*3600e3]],[midsData,...results]=await Promise.all([getMids(),...defs.map(([iv,lb])=>getCandles(S.coin,iv,now-lb,now).catch(()=>[]))]);const cd={};defs.forEach(([iv],i)=>{cd[iv]=Array.isArray(results[i])?results[i]:[]});if(S.mids)S.prev={...S.mids};S.mids=midsData;S.candles=cd;const price=midsData[S.coin]?+midsData[S.coin]:0;S.sigs={ict:runICT(cd["4h"],cd["15m"],cd["1d"],price),orb:runORB(cd["5m"],cd["1m"],price),tt:runTT(cd["15m"],cd["1d"],price),qf:runQF(cd["15m"],cd["1m"],cd["1d"],price)};S.lastT=new Date();S.loading=false;S.chartOffset=0}catch(e){S.err=e.message;S.loading=false}renderGlobal()}
window.switchCoin=function(c){S.coin=c;S.chartOffset=0;S.chartZoomY=1;loadData()};
window.setTF=function(tf){S.tf=tf;S.chartOffset=0;S.chartZoomY=1;document.getElementById("tfBtns").innerHTML=TFS.map(t=>'<button class="tf-btn'+(t===tf?" active":"")+'" onclick="setTF(\''+t+'\')">'+t.toUpperCase()+'</button>').join("");drawChart()};
function connectWS(){try{const ws=new WebSocket(WSU);ws.onopen=()=>{ws.send(JSON.stringify({method:"subscribe",subscription:{type:"allMids"}}));S.wsOk=true;renderGlobal()};ws.onmessage=e=>{try{const d=JSON.parse(e.data);if(d?.channel==="allMids"&&d?.data?.mids){if(S.mids)S.prev={...S.mids};S.mids=d.data.mids;if(S.tab==='signals'){const p=S.mids[S.coin]?+S.mids[S.coin]:0;document.getElementById("priceDisplay").textContent=p?fmtPx(p):"$--";drawChart()}}}catch{}};ws.onclose=()=>{S.wsOk=false;setTimeout(connectWS,5000)};ws.onerror=()=>{S.wsOk=false}}catch(e){setTimeout(connectWS,5000)}}
window.addEventListener("resize",()=>{if(S.tab==='signals')drawChart()});
if('Notification'in window&&Notification.permission==='default')document.addEventListener('click',function rn(){Notification.requestPermission();document.removeEventListener('click',rn)},{once:true});
loadData();connectWS();runScanner();setInterval(loadData,30000);setInterval(runScanner,60000);
</script></body></html>
